server:
  # Port 3000 matches the TypeScript version so FE/Playwright can use the same URL.
  port: ${PORT:3000}

spring:
  servlet:
    multipart:
      # Maps to UPLOAD_MAX_BYTES via UploadProperties; Spring also enforces this limit
      # at the servlet layer → throws MaxUploadSizeExceededException → 413.
      max-file-size: ${UPLOAD_MAX_BYTES:5242880}B
      max-request-size: ${UPLOAD_MAX_BYTES:5242880}B

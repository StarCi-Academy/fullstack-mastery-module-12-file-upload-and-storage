name: s3-minio-presigned-urls

services:
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: s3-minio-presigned-urls-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minio-data:
